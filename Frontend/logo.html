
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
  .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
    background: #050816;
    border-radius: 24px;
    min-height: 320px;
  }
  svg.logo { overflow: visible; }

  /* orbit rings */
  .ring1 { animation: spin1 6s linear infinite; transform-origin: 200px 130px; }
  .ring2 { animation: spin2 9s linear infinite; transform-origin: 200px 130px; }
  .ring3 { animation: spin3 12s linear infinite; transform-origin: 200px 130px; }

  @keyframes spin1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spin2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
  @keyframes spin3 { from { transform: rotate(30deg); } to { transform: rotate(390deg); } }

  /* dot pulses on ring ends */
  .dot1 { animation: pulse1 6s linear infinite; transform-origin: 200px 130px; }
  .dot2 { animation: pulse2 9s linear infinite; transform-origin: 200px 130px; }

  @keyframes pulse1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulse2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

  /* core glow breathe */
  .core-glow { animation: breathe 3s ease-in-out infinite; transform-origin: 200px 130px; }
  @keyframes breathe {
    0%,100% { opacity: 0.5; r: 38; }
    50%      { opacity: 0.9; r: 44; }
  }
  .core-inner { animation: breathe2 3s ease-in-out infinite; transform-origin: 200px 130px; }
  @keyframes breathe2 {
    0%,100% { opacity: 1; r: 22; }
    50%      { opacity: 0.8; r: 26; }
  }

  /* hex facets rotate slow */
  .hex-group { animation: hexspin 20s linear infinite; transform-origin: 200px 130px; }
  @keyframes hexspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* path trail draw */
  .trail { stroke-dasharray: 320; stroke-dashoffset: 320; animation: draw 2s ease-out forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* text shimmer */
  .logo-text { animation: shimmer 4s ease-in-out infinite; }
  @keyframes shimmer {
    0%,100% { fill: url(#tg1); }
    50%      { fill: url(#tg2); }
  }
  .sub-text { animation: subfade 3s ease-in-out infinite; }
  @keyframes subfade {
    0%,100% { opacity: 0.6; }
    50%      { opacity: 1; }
  }

  /* spark particles */
  .spark { animation: sparkanim var(--d,4s) ease-in-out infinite; transform-origin: 200px 130px; }
  @keyframes sparkanim {
    0%   { transform: rotate(var(--s,0deg)) translateX(var(--r,60px)) scale(1); opacity:0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: rotate(calc(var(--s,0deg) + 360deg)) translateX(var(--r,60px)) scale(0.3); opacity:0; }
  }
</style>

<div class="logo-wrap">
<svg class="logo" width="520" height="260" viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ring1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="ring2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="ring3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="logoClip">
      <rect x="0" y="0" width="520" height="260"/>
    </clipPath>
  </defs>

  <g clip-path="url(#logoClip)">

  <!-- ambient bg glow blobs -->
  <ellipse cx="200" cy="130" rx="90" ry="90" fill="#22d3ee" opacity="0.04"/>
  <ellipse cx="200" cy="130" rx="70" ry="70" fill="#a855f7" opacity="0.05"/>

  <!-- hex facets (slow spin outer decoration) -->
  <g class="hex-group">
    <polygon points="200,60 217,70 217,90 200,100 183,90 183,70" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.25"/>
    <polygon points="200,30 224,44 224,72 200,86 176,72 176,44" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- orbit ring 1 — cyan, tilted ellipse -->
  <g class="ring1">
    <ellipse cx="200" cy="130" rx="78" ry="26" fill="none" stroke="url(#ring1Grad)" stroke-width="1.2" stroke-dasharray="6 3"/>
  </g>

  <!-- orbit ring 2 — purple, different tilt -->
  <g class="ring2">
    <ellipse cx="200" cy="130" rx="26" ry="78" fill="none" stroke="url(#ring2Grad)" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- orbit ring 3 — blue, diagonal -->
  <g class="ring3" style="transform: rotate(45deg); transform-origin: 200px 130px;">
    <ellipse cx="200" cy="130" rx="68" ry="22" fill="none" stroke="url(#ring3Grad)" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.7"/>
  </g>

  <!-- spark particles -->
  <circle class="spark" style="--s:0deg;--r:72px;--d:4s"   cx="200" cy="130" r="2.5" fill="#22d3ee" filter="url(#glow)"/>
  <circle class="spark" style="--s:120deg;--r:72px;--d:4s" cx="200" cy="130" r="2"   fill="#a855f7" filter="url(#glow)"/>
  <circle class="spark" style="--s:240deg;--r:72px;--d:4s" cx="200" cy="130" r="2.5" fill="#3b82f6" filter="url(#glow)"/>
  <circle class="spark" style="--s:60deg;--r:55px;--d:6s"  cx="200" cy="130" r="1.8" fill="#22d3ee" opacity="0.7"/>
  <circle class="spark" style="--s:200deg;--r:55px;--d:6s" cx="200" cy="130" r="1.8" fill="#a855f7" opacity="0.7"/>

  <!-- path trail arc (drawn on load) -->
  <path class="trail" d="M 140 175 Q 170 80 200 130 Q 230 180 260 85" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- core glow outer -->
  <circle class="core-glow" cx="200" cy="130" r="38" fill="url(#coreGrad)" filter="url(#softglow)"/>

  <!-- core ring -->
  <circle cx="200" cy="130" r="32" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
  <circle cx="200" cy="130" r="32" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3" stroke-dasharray="10 5"/>

  <!-- core inner -->
  <circle class="core-inner" cx="200" cy="130" r="22" fill="#050816" stroke="#6366f1" stroke-width="1.5"/>

  <!-- forge "F" mark inside core -->
  <text x="200" y="137" text-anchor="middle" dominant-baseline="middle"
        font-family="'Orbitron', monospace" font-weight="900" font-size="18"
        fill="url(#tg1)" filter="url(#glow)">PF</text>

  <!-- brand name -->
  <text class="logo-text" x="296" y="118"
        font-family="'Orbitron', monospace" font-weight="900" font-size="34"
        fill="url(#tg1)" letter-spacing="2">PathForge</text>

  <!-- AI badge -->
  <rect x="296" y="128" width="48" height="22" rx="6" fill="#22d3ee" opacity="0.12" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="320" y="143" text-anchor="middle"
        font-family="'Orbitron', monospace" font-weight="700" font-size="13"
        fill="#22d3ee" letter-spacing="3">AI</text>

  <!-- tagline -->
  <text class="sub-text" x="296" y="170"
        font-family="'Orbitron', monospace" font-weight="400" font-size="10"
        fill="#94a3b8" letter-spacing="4">FORGE YOUR FUTURE</text>

  <!-- decorative tick marks around the core -->
  <line x1="200" y1="92"  x2="200" y2="98"  stroke="#22d3ee" stroke-width="1.2" opacity="0.5"/>
  <line x1="200" y1="162" x2="200" y2="168" stroke="#22d3ee" stroke-width="1.2" opacity="0.5"/>
  <line x1="162" y1="130" x2="168" y2="130" stroke="#a855f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="232" y1="130" x2="238" y2="130" stroke="#a855f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="175" y1="105" x2="179" y2="110" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="221" y1="150" x2="225" y2="155" stroke="#6366f1" stroke-width="1" opacity="0.4"/>

  </g>
</svg>
</div>
